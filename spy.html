<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕵️ Lien traqué — Lingotech</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1410;color:#f7f1e6;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
.container{max-width:480px}
.spy-icon{font-size:4rem;margin-bottom:16px}
h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#caa15a,#f5d76e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
p{color:#c9b9a3;font-size:1.05rem;line-height:1.6;margin-bottom:8px}
.count{font-size:3rem;font-weight:800;background:linear-gradient(135deg,#caa15a,#f5d76e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:16px 0}
.label{color:#c9b9a3;font-size:.85rem;margin-bottom:24px}
.btn{display:inline-block;padding:14px 32px;border-radius:10px;background:linear-gradient(135deg,#caa15a,#f5d76e);color:#1a1410;font-size:1rem;font-weight:600;text-decoration:none;cursor:pointer;border:none;transition:all .3s}
.btn:hover{transform:translateY(-2px)}
.footer{position:fixed;bottom:16px;left:0;right:0;color:#c9b9a3;font-size:.8rem}
.footer a{color:#e3b04b;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <div class="spy-icon">🕵️</div>
  <h1>Lien traqué</h1>
  <p>Vous allez être redirigé vers Lingotech dans quelques instants.</p>
  <p>Votre visite a été enregistrée.</p>
  <div class="count" id="visitCount">0</div>
  <div class="label">visites enregistrées</div>
  <a href="/" class="btn" id="goBtn">Aller directement</a>
</div>
<div class="footer"><a href="https://lingotech-six.vercel.app">Lingotech</a> • Données stockées localement 🕵️</div>

<script src="tracker.js"></script>
<script>
(function(){
  const count = document.getElementById('visitCount');
  function updateCount(){
    if(window.__tracker){
      const s = window.__tracker.stats();
      count.textContent = s.totalVisits;
    }
  }
  updateCount();
  setTimeout(updateCount, 500);

  // Redirect after 4s
  setTimeout(function(){
    window.location.href = '/';
  }, 4000);

  document.getElementById('goBtn').addEventListener('click', function(e){
    e.preventDefault();
    window.location.href = '/';
  });
})();
</script>
</body>
</html>
